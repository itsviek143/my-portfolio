<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;

    background: linear-gradient(135deg, #050505, #111827);
    font-family: Arial, sans-serif;
}

.box {
    width: 280px;
    padding: 30px;

    text-align: center;

    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;

    box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.5),
        inset 0 0 20px rgba(255, 255, 255, 0.03);

    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 40px rgba(0, 255, 170, 0.2);
}

h2 {
    color: #aaa;
    font-size: 1.2rem;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 4px;
}

#time,
#date {
    color: #00ff99;
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 3px;

    padding: 15px 10px;

    background: #050505;
    border: 2px solid #00ff99;
    border-radius: 10px;

    box-shadow:
        0 0 10px rgba(0, 255, 153, 0.5),
        inset 0 0 10px rgba(0, 255, 153, 0.1);

    text-shadow: 0 0 10px #00ff99;
}

@media (max-width: 650px) {
    body {
        flex-direction: column;
    }

    .box {
        width: 85%;
        max-width: 320px;
    }
}
    </style>
</head>
<body>

<div class="box">

    <h2>Time</h2>
    <div id="time"></div>

</div>

<div class="box">

    <h2>Date</h2>
    <div id="date"></div>

</div>

<script>
    let time=document.querySelector("#time");
let date=document.querySelector("#date");

showtime=()=>{
    let now= new Date;

    let hours=now.getHours();
    let Minutes=now.getMinutes();
    let Seconds=now.getSeconds();

    let day=now.getDate();
    let month=now.getMonth()+1;
    let year=now.getFullYear();

    if(hours<10){
        hours="0"+hours;
    }

    if(Minutes<10){
        Minutes="0"+Minutes;
    }

    if(Seconds<10){
        Seconds="0"+Seconds;
    }

    if(day<10){
        day="0"+day;
    }

    if(month<10){
        month="0"+month;
    }

    time.innerText=`${hours}:${Minutes}:${Seconds}`;
    date.innerText=`${day}:${month}:${year}`;

}
showtime();
setInterval(showtime,1000);
</script>
    
</body>
</html>
