<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contactForm</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
<form action="" id="form">
    <div class="contact">
        
        <h1>Contact me</h1>
        <p>Feel free to contact me for projects,interships,or collaboration</p>
        <input type="text" placeholder="Full Name" id="name" required>
        <input type="email" placeholder="Email Address" id="email" required>
        <textarea placeholder="Message"></textarea>
        <p id="message"></p>
        <div class="button1">
        <button class="btn" id="submit">Send Message</button>
        <button type="reset" class="btn" id="reset">Reset</button>
        </div>
        
    </div>
    </form>
        <script>
const form = document.querySelector("#form");
const nameInput = document.querySelector("#name");
const emailId=document.querySelector("#email");
const message = document.querySelector("#message");

form.addEventListener("submit", function(event) {

    event.preventDefault();

    let name = nameInput.value.trim();
    let email=emailId.value;

    if (name === "" || email === "") {
        message.innerText = "Fill all fields";
        return;
    }
    
    message.innerText = "Message has send";

    console.log(name);
    console.log(email);
    
});

form.addEventListener("reset", function() {
    message.innerText = "";
});
</script>
    
</body>
</html>
